<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tavla</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #f3e2b2;
      color: #3d2b1f;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      box-sizing: border-box;
    }
    .topbar {
      width: 100%;
      max-width: 960px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }
    .topbar h1 {
      margin: 0;
      font-size: 1.6rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    button {
      border: none;
      background: #8b5a24;
      color: #fff;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover {
      background: #a06a2b;
    }
    .status {
      width: 100%;
      max-width: 960px;
      text-align: center;
      font-weight: bold;
      margin-bottom: 12px;
    }
    #board {
      width: 100%;
      max-width: 960px;
      aspect-ratio: 3 / 2;
      border: 8px solid #8b5a24;
      border-radius: 16px;
      background: #d9b97a;
      display: block;
    }
  </style>
</head>
<body>

  <div class="topbar">
    <h1>🎲 Tavla Oyunu</h1>
    <div class="controls">
      <button onclick="rollDice()">Zar At</button>
      <button onclick="resetGame()">Yeniden Başlat</button>
    </div>
  </div>

  <div class="status" id="status">Oyun başladı</div>

  <canvas id="board" width="900" height="600"></canvas>

  <script src="tavla.js"></script>
</body>
</html>
